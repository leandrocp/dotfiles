id = "dotfiles.current-tab-title"
name = "Current Tab Title"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Keep the outer terminal title synchronized with the focused Herdr tab."
platforms = ["macos", "linux"]

[[actions]]
id = "refresh"
title = "Refresh current tab title"
contexts = ["workspace", "tab", "pane"]
command = ["bun", "sync-title.js"]

[[events]]
on = "workspace.focused"
command = ["bun", "sync-title.js"]

[[events]]
on = "workspace.renamed"
command = ["bun", "sync-title.js"]

[[events]]
on = "tab.focused"
command = ["bun", "sync-title.js"]

[[events]]
on = "tab.renamed"
command = ["bun", "sync-title.js"]
