[bootstrap.macos.dock]
autohide = true
show_recents = false

[bootstrap.macos.finder]
show_extensions_warning = false
show_pathbar = true
show_status_bar = true
show_all_files = true

[bootstrap.macos.keyboard]
initial_key_repeat = 10
key_repeat = 1
press_and_hold = false

[bootstrap.macos.trackpad]
tap_to_click = true

[bootstrap.hooks.post-defaults]
run = """
symbolic_hotkeys_plist="$HOME/Library/Preferences/com.apple.symbolichotkeys.plist"
for key in 64 65; do
  /usr/libexec/PlistBuddy -c "Set :AppleSymbolicHotKeys:${key}:enabled false" "$symbolic_hotkeys_plist" 2>/dev/null || \
    /usr/libexec/PlistBuddy -c "Add :AppleSymbolicHotKeys:${key}:enabled bool false" "$symbolic_hotkeys_plist"
done
chflags nohidden "$HOME/Library"
for app in "Dock" "Finder" "Safari" "Spotlight" "SystemUIServer"; do
  killall "$app" >/dev/null 2>&1 || true
done
"""

[env]
DO_NOT_TRACK = "true"
ECTO_EDITOR = "zed __FILE__:__LINE__"
EDITOR = "nvim"
ELIXIR_EDITOR = "zed __FILE__:__LINE__"
ERL_AFLAGS = "-kernel shell_history enabled"
FLYCTL_HOME = "$HOME/.fly"
GH_TELEMETRY = "false"
GIT_EDITOR = "nvim"
KERL_BUILD_DOCS = "yes"
LUMIS_CONFIG = "$HOME/.config/lumis/config.toml"
MANPAGER = "less -X"
MIX_OS_DEPS_COMPILE_PARTITION_COUNT = "5"
PLUG_EDITOR = "zed://file/__FILE__:__LINE__"
RIPGREP_CONFIG_PATH = "$HOME/.config/ripgrep/ripgreprc"
VISUAL = "nvim"

