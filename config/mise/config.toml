[tasks.web-server]
description = "Start a simple HTTP server and open it in the browser"
run = """
port="${1:-8000}"
sleep 1 && open "http://localhost:${port}/" &
python -m http.server "$port"
"""

[tasks.up]
description = "Update system packages, mise tools, zinit, and Neovim packages"
run = """
set -euo pipefail
mise bootstrap packages apply --yes
mise bootstrap packages upgrade --yes
mise up
pi update --extensions
zsh -lc 'source "$HOME/.shell/zinit" && zinit self-update && zinit update'
nvim --headless -c "lua vim.pack.update(nil, { force = true })" -c "quit"
"""

[tasks.clean]
description = "Clean package-manager caches and generated artifacts"
run = """
set -euo pipefail

printf 'Run cleanup? This deletes caches, unused mise tool versions, Docker artifacts, and node_modules under $HOME/code. [y/N] '
read -r confirm
case "$confirm" in
  [yY]) ;;
  *) echo "Cancelled."; exit 0 ;;
esac

echo "==> bootstrap packages"
mise bootstrap packages prune --manager brew --yes

echo "==> mise"
mise cache prune
mise prune

echo "==> npm"
npm cache verify
npx --yes npkill --directory "$HOME/code" --exclude-sensitive --delete-all -y

echo "==> mac-cleaner-cli"
echo "Leave browser categories unselected. mac-cleaner-cli has no non-interactive browser skip flag."
npx --yes mac-cleaner-cli

echo "==> Cargo"
if ! command -v cargo-cache >/dev/null; then
  cargo install cargo-cache
fi
cargo cache --autoclean

echo "==> Docker"
if command -v docker >/dev/null && docker info >/dev/null 2>&1; then
  docker system prune --all --force
  docker builder prune --all --force
else
  echo "Docker is not running; skipping."
fi
"""

[tasks."realtime:dev"]
description = "Start Realtime dev server"
dir = "{{cwd}}"
run = """
source "$HOME/.config/mise/realtime-worktree-env.sh"
echo "realtime dev: branch=$branch NAME=$NAME PORT=$PORT GEN_RPC_TCP_SERVER_PORT=$GEN_RPC_TCP_SERVER_PORT"
echo "  -> http://localhost:$PORT"
exec iex --name "${NAME}@127.0.0.1" --cookie cookie -S mix phx.server
"""

[tasks."realtime:setup"]
description = "Set up Realtime (deps, db, seeds) for the current worktree"
dir = "{{cwd}}"
run = """
source "$HOME/.config/mise/realtime-worktree-env.sh"
echo "realtime setup: branch=$branch GEN_RPC_TCP_SERVER_PORT=$GEN_RPC_TCP_SERVER_PORT"
exec mix setup
"""

[tasks."gh:rerun-failed"]
description = "Re-run failed GitHub Actions jobs for a repo or PR (--pr N, --repo OWNER/REPO, --dry-run)"
dir = "{{cwd}}"
run = 'exec "$HOME/.config/mise/gh-rerun-failed.sh" "$@"'
